<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PD Tracker | Reset password</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00A599">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div>
    <h1>PD Tracker</h1>
    <div class="sub">Professional development, captured in the moment</div>
  </div>
</header>

<main class="container">

  <div class="card">
    <div id="reset-loading" class="empty-state">Checking your reset link…</div>

    <div id="reset-invalid" style="display:none">
      <h2>Link invalid or expired</h2>
      <p class="hint">This password reset link is no longer valid. Request a new one from the login page.</p>
      <a class="btn btn-primary btn-block" style="margin-top:10px" href="index.html">Back to log in</a>
    </div>

    <form id="reset-form" style="display:none" onsubmit="return false">
      <h2>Set a new password</h2>
      <p class="hint">Choose a new password for your account.</p>
      <label for="new-password">New password</label>
      <input type="password" id="new-password" autocomplete="new-password">
      <label for="confirm-password">Confirm new password</label>
      <input type="password" id="confirm-password" autocomplete="new-password">
      <div id="reset-error"></div>
      <button type="button" class="btn btn-primary btn-block" style="margin-top:18px" id="reset-submit-btn" onclick="updatePassword()">Update password</button>
    </form>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
let recoverySessionReady = false;

function showInvalidLink() {
  document.getElementById("reset-loading").style.display = "none";
  document.getElementById("reset-invalid").style.display = "block";
}

function showResetForm() {
  document.getElementById("reset-loading").style.display = "none";
  document.getElementById("reset-form").style.display = "block";
}

async function updatePassword() {
  document.getElementById("reset-error").innerHTML = "";
  const password = document.getElementById("new-password").value;
  const confirmPassword = document.getElementById("confirm-password").value;
  if (password.length < 6) {
    document.getElementById("reset-error").innerHTML = '<div class="error">Password must be at least 6 characters.</div>';
    return;
  }
  if (password !== confirmPassword) {
    document.getElementById("reset-error").innerHTML = '<div class="error">Passwords don\'t match.</div>';
    return;
  }

  const btn = document.getElementById("reset-submit-btn");
  btn.disabled = true;
  btn.textContent = "Updating…";

  const { error } = await db.auth.updateUser({ password });

  if (error) {
    btn.disabled = false;
    btn.textContent = "Update password";
    document.getElementById("reset-error").innerHTML = `<div class="error">${error.message}</div>`;
    return;
  }

  document.getElementById("reset-form").innerHTML = '<div class="success">Password updated. Redirecting you to log in…</div>';
  setTimeout(() => { window.location.href = "index.html"; }, 1500);
}

(async () => {
  if (!db) return showInvalidLink();

  db.auth.onAuthStateChange((event) => {
    if (event === "PASSWORD_RECOVERY") {
      recoverySessionReady = true;
      showResetForm();
    }
  });

  const { data: { session } } = await db.auth.getSession();
  if (session) {
    recoverySessionReady = true;
    showResetForm();
    return;
  }

  setTimeout(() => {
    if (!recoverySessionReady) showInvalidLink();
  }, 2000);
})();
</script>
</body>
</html>
